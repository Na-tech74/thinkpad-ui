<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkPad Shop</title>

    <link rel="stylesheet" href="./bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./bootstrap/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="./assets/style/header.css">
    <link rel="stylesheet" href="./assets/style/footer.css">
    <link rel="stylesheet" href="./assets/style/order.css">
</head>
<body>
    <!--Header-->
    <header class="navbar navbar-expand-lg navbar-dark bg-black fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="./index.html">ThinkPad <span class="text-light">Shop</span></a>
            <div class="d-flex align-items-center gap-2 ms-auto order-lg-3">
                <div class="dropdown">
                    <a class="nav-link dropdown-toggle text-light px-2" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person fs-6"></i> <span class="d-none d-sm-inline">Tài khoản</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="./login.html">Đăng nhập</a></li>
                        <li><a class="dropdown-item" href="./register.html">Đăng ký</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#" onclick="logoutUser();location.reload();return false;">Đăng xuất</a></li>
                    </ul>
                </div>
                <a href="./cart.html" class="nav-link text-light px-2 position-relative">
                    <i class="bi bi-cart3 fs-6"></i>
                    <span class="badge bg-danger rounded-pill position-absolute cart-badge" style="font-size:0.65rem;top:-2px;right:-4px;display:none;">0</span>
                    <span class="d-none d-sm-inline ms-1">Giỏ hàng</span>
                </a>
            </div>
            <button class="navbar-toggler order-lg-4" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse order-lg-2" id="navbarMenu">
                <ul class="navbar-nav mx-auto" id="mainMenu"></ul>
                <script src="./data/homedb.js"></script>
                <script>
                    const mainMenu = document.getElementById("mainMenu");
                    menuItems.forEach((item) => {
                        mainMenu.innerHTML += `
                            <li class="nav-item mx-2">
                                <a class="nav-link fw-semibold" href="${item.href}">${item.text}</a>
                            </li>
                        `;
                    });
                    updateCartBadge();
                    if (isLoggedIn()) {
                        const dd = document.querySelector('.dropdown .dropdown-toggle');
                        if (dd) dd.innerHTML = '<i class="bi bi-person-check fs-6"></i> <span class="d-none d-sm-inline">Tài khoản</span>';
                    }
                </script>
            </div>
        </div>
    </header>

    <main>
        <div class="container py-2 bc-top">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="./index.html">Trang chủ</a></li>
                    <li class="breadcrumb-item"><a href="./cart.html">Giỏ hàng</a></li>
                    <li class="breadcrumb-item"><a href="./payment.html">Thanh toán</a></li>
                    <li class="breadcrumb-item active">Hoàn tất</li>
                </ol>
            </nav>
        </div>

        <div class="order-wrapper" id="order-container"></div>
    </main>

    <script>
        const orderContainer = document.getElementById("order-container");
        const orderData = JSON.parse(localStorage.getItem('thinkpad_order') || '{}');
        const items = orderData.items || [];
        const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
        const shipping = subtotal >= 50000000 ? 0 : 500000;
        const total = subtotal + shipping;
        const orderId = 'TP' + Date.now().toString(36).toUpperCase();

        document.title = 'Đặt hàng thành công - ThinkPad Shop';

        const itemsHtml = items.map(item => `
            <tr>
                <td class="d-flex align-items-center gap-2">
                    <img src="${item.image}" alt="" style="width:40px;height:40px;object-fit:contain;background:#fafafa;border-radius:4px;padding:4px;">
                    <span class="small">${item.name}</span>
                </td>
                <td class="text-center small">x${item.qty}</td>
                <td class="text-end small fw-bold">${fmtPrice(item.price * item.qty)}</td>
            </tr>
        `).join('');

        orderContainer.innerHTML = `
            <div class="container">
                <div class="text-center mb-4">
                    <div class="order-success-icon">
                        <i class="bi bi-check-circle-fill"></i>
                    </div>
                    <h4 class="fw-bold text-success mt-3">Đặt hàng thành công!</h4>
                    <p class="text-muted">Cảm ơn bạn đã mua sắm tại ThinkPad Shop</p>
                </div>

                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="order-card card border-0 shadow-sm mb-3">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h6 class="fw-bold mb-0">Mã đơn hàng</h6>
                                    <span class="fw-bold text-danger">${orderId}</span>
                                </div>
                                <hr>
                                <h6 class="fw-bold mb-3">Sản phẩm đã đặt</h6>
                                <div class="table-responsive">
                                    <table class="table table-borderless mb-0">
                                        <tbody>${itemsHtml || '<tr><td class="text-muted small">Không có sản phẩm</td></tr>'}</tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <div class="order-card card border-0 shadow-sm mb-3">
                            <div class="card-body">
                                <h6 class="fw-bold mb-3">Thông tin giao hàng</h6>
                                <p class="mb-1 small"><strong>Họ tên:</strong> ${orderData.name || '—'}</p>
                                <p class="mb-1 small"><strong>SĐT:</strong> ${orderData.phone || '—'}</p>
                                <p class="mb-1 small"><strong>Email:</strong> ${orderData.email || '—'}</p>
                                <p class="mb-1 small"><strong>Địa chỉ:</strong> ${orderData.address || '—'}${orderData.city ? ', ' + orderData.city : ''}${orderData.ward ? ', ' + orderData.ward : ''}</p>
                                <p class="mb-0 small"><strong>Phương thức:</strong> ${orderData.payment === 'cod' ? 'Thanh toán khi nhận hàng' : orderData.payment === 'bank' ? 'Chuyển khoản ngân hàng' : 'Thẻ tín dụng / Ghi nợ'}</p>
                            </div>
                        </div>

                        <div class="order-card card border-0 shadow-sm">
                            <div class="card-body">
                                <h6 class="fw-bold mb-3">Tổng đơn hàng</h6>
                                <div class="d-flex justify-content-between mb-1 small">
                                    <span class="text-muted">Tạm tính</span>
                                    <span>${fmtPrice(subtotal)}</span>
                                </div>
                                <div class="d-flex justify-content-between mb-1 small">
                                    <span class="text-muted">Phí vận chuyển</span>
                                    <span>${shipping === 0 ? 'Miễn phí' : fmtPrice(shipping)}</span>
                                </div>
                                <hr>
                                <div class="d-flex justify-content-between fw-bold">
                                    <span>Tổng cộng</span>
                                    <span class="text-danger fs-5">${fmtPrice(total)}</span>
                                </div>
                            </div>
                        </div>

                        <div class="text-center mt-4">
                            <a href="./products.html" class="btn btn-danger">
                                <i class="bi bi-box me-1"></i>Tiếp tục mua sắm
                            </a>
                            <a href="./index.html" class="btn btn-outline-danger ms-2">
                                <i class="bi bi-house me-1"></i>Về trang chủ
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        `;
    </script>

    <!-- Footer -->
    <footer class="bg-black text-light pt-5 pb-3 mt-5" id="footer-container"></footer>
    <script>
        const footerContainer = document.getElementById("footer-container");
        const footerHTML = `
            <div class="container">
                <div class="row g-4">
                    <div class="col-lg-4 col-6">
                        <h3 class="fw-bold text-danger">${footerData.brand.name} <span class="text-light">${footerData.brand.suffix}</span></h3>
                        <p class="text-secondary mt-3">${footerData.brand.desc}</p>
                        <div class="d-flex gap-3 mt-4">${footerData.brand.socials.map(s => `<a href="${s.href}" class="social-icon"><i class="bi ${s.icon}"></i></a>`).join('')}</div>
                    </div>
                    <div class="col-lg-2 col-6">
                        <h5 class="footer-title">${footerData.navigation.title}</h5>
                        <ul class="list-unstyled">${footerData.navigation.links.map(l => `<li><a href="${l.href}" class="footer-link">${l.text}</a></li>`).join('')}</ul>
                    </div>
                    <div class="col-lg-3 col-6">
                        <h5 class="footer-title">${footerData.support.title}</h5>
                        <ul class="list-unstyled">${footerData.support.links.map(l => `<li><a href="${l.href}" class="footer-link">${l.text}</a></li>`).join('')}</ul>
                    </div>
                    <div class="col-lg-3 col-6">
                        <h5 class="footer-title">${footerData.contact.title}</h5>
                        ${footerData.contact.items.map(item => `<p><i class="bi ${item.icon} text-danger"></i> ${item.text}</p>`).join('')}
                    </div>
                </div>
                <hr class="footer-divider">
                <div class="row align-items-center">
                    <div class="col-md-6 text-center text-md-start"><p class="copyright mb-0">${footerData.copyright}</p></div>
                    <div class="col-md-6 text-center text-md-end mt-3 mt-md-0"><span class="text-secondary">${footerData.builtWith}</span></div>
                </div>
            </div>
        `;
        footerContainer.innerHTML = footerHTML;
    </script>
    <script src="./bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
