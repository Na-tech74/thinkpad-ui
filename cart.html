<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - ThinkPad Shop</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./bootstrap/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="./assets/style/header.css">
    <link rel="stylesheet" href="./assets/style/footer.css">
    <link rel="stylesheet" href="./assets/style/cart.css">
</head>
<body>
    <!--Header-->
    <header class="navbar navbar-expand-lg navbar-dark bg-black fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="./index.html">
                ThinkPad <span class="text-light">Shop</span>
            </a>

            <div class="d-flex align-items-center gap-2 ms-auto order-lg-3">
                <div class="dropdown">
                    <a class="nav-link dropdown-toggle text-light px-2 position-relative" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-bell fs-6"></i>
                        <span class="badge bg-danger rounded-pill position-absolute notif-badge" style="font-size:0.6rem;top:-1px;right:-2px;display:none;">0</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end notif-dropdown">
                        <li><span class="dropdown-item-text text-muted small">Không có thông báo</span></li>
                    </ul>
                </div>
                <div class="dropdown">
                    <a class="nav-link dropdown-toggle text-light px-2" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person fs-6"></i> <span class="d-none d-sm-inline">Tài khoản</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="./login.html">Đăng nhập</a></li>
                        <li><a class="dropdown-item" href="./register.html">Đăng ký</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#" onclick="logoutUser();location.reload();return false;">Đăng xuất</a></li>
                    </ul>
                </div>
                <a href="./cart.html" class="nav-link text-light px-2 position-relative">
                    <i class="bi bi-cart3 fs-6"></i>
                    <span class="badge bg-danger rounded-pill position-absolute cart-badge" style="font-size:0.65rem;top:-2px;right:-4px;display:none;">0</span>
                    <span class="d-none d-sm-inline ms-1">Giỏ hàng</span>
                </a>
            </div>

            <button class="navbar-toggler order-lg-4" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse order-lg-2" id="navbarMenu">
                <ul class="navbar-nav mx-auto" id="mainMenu"></ul>
                <script>
const menuItems=[{href:"./index.html",text:"Trang chủ"},{href:"./products.html",text:"Sản phẩm"},{href:"./about.html",text:"Giới thiệu"},{href:"./contact.html",text:"Liên hệ"}];
const footerData={brand:{name:'ThinkPad',suffix:'Shop',desc:'Chuyên cung cấp các dòng ThinkPad chính hãng với chất lượng cao, bảo hành uy tín và dịch vụ hỗ trợ tận tâm.',socials:[{icon:'bi-facebook',href:'#'},{icon:'bi-youtube',href:'#'},{icon:'bi-instagram',href:'#'},{icon:'bi-github',href:'#'}]},navigation:{title:'Điều hướng',links:[{href:'./index.html',text:'Trang chủ'},{href:'./products.html',text:'Sản phẩm'},{href:'./about.html',text:'Giới thiệu'},{href:'./contact.html',text:'Liên hệ'}]},support:{title:'Hỗ trợ khách hàng',links:[{href:'#',text:'Chính sách bảo hành'},{href:'#',text:'Đổi trả sản phẩm'},{href:'#',text:'Hướng dẫn mua hàng'},{href:'#',text:'Câu hỏi thường gặp'}]},contact:{title:'Liên hệ',items:[{icon:'bi-geo-alt-fill',text:'TP. Hồ Chí Minh, Việt Nam'},{icon:'bi-telephone-fill',text:'0123 456 789'},{icon:'bi-envelope-fill',text:'support@thinkpadshop.com'}]},copyright:'© 2026 ThinkPad Shop. Design by Nam Nguyễn.',builtWith:'Built with Bootstrap 5'};
function isLoggedIn(){return localStorage.getItem('thinkpad_logged_in')==='true'}function loginUser(){localStorage.setItem('thinkpad_logged_in','true')}function logoutUser(){localStorage.removeItem('thinkpad_logged_in')}function getCart(){try{return JSON.parse(localStorage.getItem('thinkpad_cart'))||[]}catch{return[]}}function saveCart(cart){localStorage.setItem('thinkpad_cart',JSON.stringify(cart))}function addToCart(product){const cart=getCart();const existing=cart.find(item=>item.id===product.id);if(existing){existing.qty+=product.qty||1}else{cart.push({id:product.id,image:product.image,name:product.name,specs:product.specs,price:typeof product.price==='string'?parsePrice(product.price):product.price,qty:product.qty||1})}saveCart(cart);alert('Đã thêm vào giỏ hàng!');updateCartBadge()}function updateCartBadge(){const cart=getCart();const count=cart.reduce((sum,item)=>sum+item.qty,0);document.querySelectorAll('.cart-badge').forEach(el=>{el.textContent=count;el.style.display=count>0?'inline':'none'})}function parsePrice(str){return parseInt(String(str).replace(/[.\s₫]/g,''))}function fmtPrice(num){return Number(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.')+'₫'}
                </script>
                <script>
                    const mainMenu = document.getElementById("mainMenu");
                    menuItems.forEach((item) => {
                        mainMenu.innerHTML += `
                            <li class="nav-item mx-2">
                                <a class="nav-link fw-semibold" href="${item.href}">${item.text}</a>
                            </li>
                        `;
                    });
                    updateCartBadge();
                    if (isLoggedIn()) {
                        const dd = document.querySelector('.dropdown .dropdown-toggle');
                        if (dd) dd.innerHTML = '<i class="bi bi-person-check fs-6"></i> <span class="d-none d-sm-inline">Tài khoản</span>';
                    }
                </script>
            </div>
        </div>
    </header>

    <!-- Breadcrumb -->
    <div class="breadcrumb-wrap">
        <div class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="./index.html"><i class="bi bi-house me-1"></i>Trang chủ</a></li>
                    <li class="breadcrumb-item active">Giỏ hàng</li>
                </ol>
            </nav>
        </div>
    </div>

    <main class="cart-wrapper" id="cart-container"></main>

    <script>
        const cartContainer = document.getElementById("cart-container");
        let cartItems = getCart();

        function renderCart() {
            const isEmpty = cartItems.length === 0;
            const subtotal = cartItems.reduce((sum, item) => sum + item.price * item.qty, 0);
            const shipping = subtotal >= 50000000 ? 0 : 500000;
            const total = subtotal + shipping;

            const itemsHtml = cartItems.map((item, idx) => `
                <div class="cart-item" data-index="${idx}">
                    <div class="row align-items-center g-3">
                        <div class="col-4 col-md-2">
                            <img src="${item.image}" alt="${item.name}" class="cart-item-img">
                        </div>
                        <div class="col-8 col-md-4">
                            <h6 class="cart-item-name">${item.name}</h6>
                            <p class="cart-item-specs">${item.specs}</p>
                            <p class="cart-item-price mb-0">${fmtPrice(item.price)}</p>
                        </div>
                        <div class="col-6 col-md-3 mt-2 mt-md-0">
                            <div class="qty-control">
                                <button onclick="changeQty(${idx}, -1)">−</button>
                                <span id="qty-${idx}">${item.qty}</span>
                                <button onclick="changeQty(${idx}, 1)">+</button>
                            </div>
                        </div>
                        <div class="col-4 col-md-2 text-center mt-2 mt-md-0">
                            <span class="cart-item-total" id="item-total-${idx}">${fmtPrice(item.price * item.qty)}</span>
                        </div>
                        <div class="col-2 col-md-1 text-end mt-2 mt-md-0">
                            <button class="btn-remove" onclick="removeItem(${idx})" title="Xóa">
                                <i class="bi bi-trash3 fs-6"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            cartContainer.innerHTML = `
                <div class="container">
                    ${isEmpty ? `
                        <div class="empty-cart">
                            <i class="bi bi-cart-x"></i>
                            <p>Giỏ hàng của bạn đang trống</p>
                            <a href="./products.html" class="btn-empty">
                                <i class="bi bi-bag me-1"></i>Mua sắm ngay
                            </a>
                        </div>
                    ` : `
                        <div class="cart-header">
                            <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
                                <div>
                                    <h1>Giỏ hàng</h1>
                                    <p>${cartItems.reduce((s, i) => s + i.qty, 0)} sản phẩm trong giỏ</p>
                                </div>
                            </div>
                        </div>
                        <div class="row mt-4">
                            <div class="col-lg-8">
                                ${itemsHtml}
                            </div>
                            <div class="col-lg-4">
                                <div class="cart-summary">
                                    <h5>Tổng đơn hàng</h5>
                                    <div class="summary-row">
                                        <span class="label">Tạm tính</span>
                                        <span class="value" id="summary-subtotal">${fmtPrice(subtotal)}</span>
                                    </div>
                                    <div class="summary-row">
                                        <span class="label">Phí vận chuyển</span>
                                        <span class="value" id="summary-shipping">${shipping === 0 ? 'Miễn phí' : fmtPrice(shipping)}</span>
                                    </div>
                                    ${shipping > 0 ? '<p class="shipping-note">Miễn phí ship khi đơn từ 50.000.000₫</p>' : ''}
                                    <hr class="summary-divider">
                                    <div class="summary-total">
                                        <span class="label">Tổng cộng</span>
                                        <span class="value" id="summary-total">${fmtPrice(total)}</span>
                                    </div>
                                    <a href="./payment.html" class="btn-checkout">
                                        <i class="bi bi-credit-card me-1"></i>Thanh toán
                                    </a>
                                    <a href="./products.html" class="btn-continue">
                                        <i class="bi bi-arrow-left me-1"></i>Tiếp tục mua sắm
                                    </a>
                                </div>
                            </div>
                        </div>
                    `}
                </div>
            `;
        }

        function updateSummary() {
            const subtotal = cartItems.reduce((sum, item) => sum + item.price * item.qty, 0);
            const shipping = subtotal >= 50000000 ? 0 : 500000;
            const total = subtotal + shipping;
            document.getElementById('summary-subtotal').textContent = fmtPrice(subtotal);
            document.getElementById('summary-shipping').textContent = shipping === 0 ? 'Miễn phí' : fmtPrice(shipping);
            document.getElementById('summary-total').textContent = fmtPrice(total);
        }

        function changeQty(idx, delta) {
            const item = cartItems[idx];
            if (!item) return;
            item.qty = Math.max(1, item.qty + delta);
            document.getElementById(`qty-${idx}`).textContent = item.qty;
            document.getElementById(`item-total-${idx}`).textContent = fmtPrice(item.price * item.qty);
            updateSummary();
            saveCart(cartItems);
        }

        function removeItem(idx) {
            cartItems.splice(idx, 1);
            saveCart(cartItems);
            updateCartBadge();
            renderCart();
        }

        renderCart();
    </script>

    <!-- Footer -->
    <footer class="bg-black text-light pt-5 pb-3 mt-5" id="footer-container"></footer>
    <script>
        const footerContainer = document.getElementById("footer-container");
        const footerHTML = `
            <div class="container">
                <div class="row g-4">
                    <div class="col-lg-4 col-6">
                        <h3 class="fw-bold text-danger">
                            ${footerData.brand.name} <span class="text-light">${footerData.brand.suffix}</span>
                        </h3>
                        <p class="text-secondary mt-3">${footerData.brand.desc}</p>
                        <div class="d-flex gap-3 mt-4">
                            ${footerData.brand.socials.map(s => `<a href="${s.href}" class="social-icon"><i class="bi ${s.icon}"></i></a>`).join('')}
                        </div>
                    </div>
                    <div class="col-lg-2 col-6">
                        <h5 class="footer-title">${footerData.navigation.title}</h5>
                        <ul class="list-unstyled">
                            ${footerData.navigation.links.map(l => `<li><a href="${l.href}" class="footer-link">${l.text}</a></li>`).join('')}
                        </ul>
                    </div>
                    <div class="col-lg-3 col-6">
                        <h5 class="footer-title">${footerData.support.title}</h5>
                        <ul class="list-unstyled">
                            ${footerData.support.links.map(l => `<li><a href="${l.href}" class="footer-link">${l.text}</a></li>`).join('')}
                        </ul>
                    </div>
                    <div class="col-lg-3 col-6">
                        <h5 class="footer-title">${footerData.contact.title}</h5>
                        ${footerData.contact.items.map(item => `<p><i class="bi ${item.icon} text-danger"></i> ${item.text}</p>`).join('')}
                    </div>
                </div>
                <hr class="footer-divider">
                <div class="row align-items-center">
                    <div class="col-md-6 text-center text-md-start">
                        <p class="copyright mb-0">${footerData.copyright}</p>
                    </div>
                    <div class="col-md-6 text-center text-md-end mt-3 mt-md-0">
                        <span class="text-secondary">${footerData.builtWith}</span>
                    </div>
                </div>
            </div>
        `;
        footerContainer.innerHTML = footerHTML;
    </script>
    <script src="./bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
