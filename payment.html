                <script>

const menuItems=[{href:"./index.html",text:"Trang chủ"},{href:"./products.html",text:"Sản phẩm"},{href:"./about.html",text:"Giới thiệu"},{href:"./contact.html",text:"Liên hệ"}];const categorise=[{title:"ThinkPad X1",content:"Cao cấp, siêu nhẹ, cho doanh nhân.",image:"./assets/image/cate.jpg"},{title:"ThinkPad T Series",content:"Văn phòng, lập trình, pin bền.",image:"./assets/image/cate.jpg"},{title:"ThinkPad P Series",content:"Workstation cho đồ họa và kỹ thuật.",image:"./assets/image/cate.jpg"},{title:"ThinkPad E Series",content:"Giá tốt cho sinh viên và văn phòng.",image:"./assets/image/cate.jpg"}];const carouselData=[{image:"./assets/image/carousel1.jpg",title:"ThinkPad X1 Carbon Gen 12",subtitle:"Siêu nhẹ · Bền bỉ · Hiệu năng đỉnh cao",active:true},{image:"./assets/image/carousel2.jpg",title:"ThinkPad T Series 2025",subtitle:"Ổn định · Chuyên nghiệp · Giá tốt",active:false},{image:"./assets/image/carousel3.jpg",title:"ThinkPad P Series Workstation",subtitle:"Đồ họa mạnh · Chuẩn kỹ sư · Hiệu năng workstation",active:false}];const featuredProducts=[{image:"./assets/image/cate.jpg",name:"ThinkPad X1 Carbon",specs:"Intel Core Ultra 7 · 32GB RAM · 1TB SSD",price:"39.990.000₫",id:"x1-carbon-gen12"},{image:"./assets/image/cate.jpg",name:"ThinkPad T14s Gen 5",specs:"AMD Ryzen 7 · 16GB RAM · 512GB SSD",price:"28.500.000₫",id:"t14s-gen5"},{image:"./assets/image/cate.jpg",name:"ThinkPad E16 Gen 2",specs:"Intel Core i7 · 16GB RAM · 512GB SSD",price:"22.990.000₫",id:"e16-gen2"},{image:"./assets/image/cate.jpg",name:"ThinkPad P16s Gen 3",specs:"AMD Ryzen 9 · 32GB RAM · 1TB SSD",price:"45.000.000₫",id:"p16s-gen3"}];const footerData={brand:{name:'ThinkPad',suffix:'Shop',desc:'Chuyên cung cấp các dòng ThinkPad chính hãng với chất lượng cao, bảo hành uy tín và dịch vụ hỗ trợ tận tâm.',socials:[{icon:'bi-facebook',href:'#'},{icon:'bi-youtube',href:'#'},{icon:'bi-instagram',href:'#'},{icon:'bi-github',href:'#'}]},navigation:{title:'Điều hướng',links:[{href:'./index.html',text:'Trang chủ'},{href:'./products.html',text:'Sản phẩm'},{href:'./about.html',text:'Giới thiệu'},{href:'./contact.html',text:'Liên hệ'}]},support:{title:'Hỗ trợ khách hàng',links:[{href:'#',text:'Chính sách bảo hành'},{href:'#',text:'Đổi trả sản phẩm'},{href:'#',text:'Hướng dẫn mua hàng'},{href:'#',text:'Câu hỏi thường gặp'}]},contact:{title:'Liên hệ',items:[{icon:'bi-geo-alt-fill',text:'TP. Hồ Chí Minh, Việt Nam'},{icon:'bi-telephone-fill',text:'0123 456 789'},{icon:'bi-envelope-fill',text:'support@thinkpadshop.com'}]},copyright:'© 2026 ThinkPad Shop. Design by Nam Nguyễn.',builtWith:'Built with Bootstrap 5'};function isLoggedIn(){return localStorage.getItem('thinkpad_logged_in')==='true'}function loginUser(){localStorage.setItem('thinkpad_logged_in','true')}function logoutUser(){localStorage.removeItem('thinkpad_logged_in')}function getCart(){try{return JSON.parse(localStorage.getItem('thinkpad_cart'))||[]}catch{return[]}}function saveCart(cart){localStorage.setItem('thinkpad_cart',JSON.stringify(cart))}function addToCart(product){const cart=getCart();const existing=cart.find(item=>item.id===product.id);if(existing){existing.qty+=product.qty||1}else{cart.push({id:product.id,image:product.image,name:product.name,specs:product.specs,price:typeof product.price==='string'?parsePrice(product.price):product.price,qty:product.qty||1})}saveCart(cart);alert('Đã thêm vào giỏ hàng!');updateCartBadge()}function updateCartBadge(){const cart=getCart();const count=cart.reduce((sum,item)=>sum+item.qty,0);document.querySelectorAll('.cart-badge').forEach(el=>{el.textContent=count;el.style.display=count>0?'inline':'none'})}function parsePrice(str){return parseInt(String(str).replace(/[.\s₫]/g,''))}function fmtPrice(num){return Number(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.')+'₫'}
// ===== end inlined homedb.js =====
                </script>
                <script>
                    const mainMenu = document.getElementById("mainMenu");
                    menuItems.forEach((item) => {
                        mainMenu.innerHTML += `
                            <li class="nav-item mx-2">

                            </li>

                    });
                    updateCartBadge();
                    if (isLoggedIn()) {
                        const dd = document.querySelector('.dropdown .dropdown-toggle');
                        if (dd) dd.innerHTML = '<i class="bi bi-person-check fs-6"></i> <span class="d-none d-sm-inline">Tài khoản</span>';

                        if (logout) logout.style.display = 'block';

    <main>
        <div class="container py-2 bc-top">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="./index.html">Trang chủ</a></li>
                    <li class="breadcrumb-item"><a href="./cart.html">Giỏ hàng</a></li>
                    <li class="breadcrumb-item active">Thanh toán</li>
                </ol>

        <div class="payment-wrapper">
            <div class="container">
                <h4 class="fw-bold mb-4">Thông tin thanh toán</h4>
                <form id="paymentForm" onsubmit="return submitOrder(event)">
                    <div class="row g-4">
                        <div class="col-lg-7">
                            <div class="payment-section card border-0 shadow-sm mb-4">
                                <div class="card-body">
                                    <h5 class="fw-bold mb-3"><i class="bi bi-person me-2"></i>Thông tin giao hàng</h5>
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Họ tên <span class="text-danger">*</span></label>
                                            <input type="text" class="form-control" required placeholder="Nguyễn Văn A">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                                            <input type="tel" class="form-control" required placeholder="0987654321">
                                        </div>
                                        <div class="col-12">
                                            <label class="form-label">Email</label>
                                            <input type="email" class="form-control" placeholder="example@email.com">
                                        </div>
                                        <div class="col-12">
                                            <label class="form-label">Địa chỉ <span class="text-danger">*</span></label>
                                            <input type="text" class="form-control" required placeholder="Số nhà, đường, phường/xã">
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label">Tỉnh/Thành</label>
                                            <select class="form-select">
                                                <option value="">Chọn</option>
                                                <option>Hồ Chí Minh</option>
                                                <option>Hà Nội</option>
                                                <option>Đà Nẵng</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label">Quận/Huyện</label>
                                            <input type="text" class="form-control" placeholder="Quận 1, Hải Châu,...">
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label">Phường/Xã</label>
                                            <input type="text" class="form-control" placeholder="Phường Bến Nghé,...">
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="payment-section card border-0 shadow-sm mb-4">
                                <div class="card-body">
                                    <h5 class="fw-bold mb-3"><i class="bi bi-credit-card me-2"></i>Phương thức thanh toán</h5>
                                    <div class="payment-options">
                                        <label class="payment-option d-flex align-items-center gap-3 p-3 border rounded mb-2">
                                            <input type="radio" name="payment" value="cod" checked>
                                            <i class="bi bi-cash-stack fs-4 text-success"></i>
                                            <div>
                                                <strong>Thanh toán khi nhận hàng (COD)</strong>
                                                <p class="mb-0 text-muted small">Trả tiền khi nhận hàng</p>
                                            </div>
                                        </label>
                                        <label class="payment-option d-flex align-items-center gap-3 p-3 border rounded mb-2">
                                            <input type="radio" name="payment" value="bank">
                                            <i class="bi bi-bank fs-4 text-primary"></i>
                                            <div>
                                                <strong>Chuyển khoản ngân hàng</strong>
                                                <p class="mb-0 text-muted small">Chuyển khoản qua tài khoản ngân hàng</p>
                                            </div>
                                        </label>
                                        <label class="payment-option d-flex align-items-center gap-3 p-3 border rounded">
                                            <input type="radio" name="payment" value="card">
                                            <i class="bi bi-credit-card-2-front fs-4 text-danger"></i>
                                            <div>
                                                <strong>Thẻ tín dụng / Ghi nợ</strong>
                                                <p class="mb-0 text-muted small">Visa, Mastercard, JCB</p>
                                            </div>
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-5">
                            <div class="payment-summary card border-0 shadow-sm">
                                <div class="card-body">
                                    <h5 class="fw-bold mb-3">Đơn hàng của bạn</h5>
                                    <div id="orderItems"></div>
                                    <hr>
                                    <div class="d-flex justify-content-between mb-2">
                                        <span class="text-muted">Tạm tính</span>
                                        <span class="fw-bold" id="paySubtotal">0₫</span>
                                    </div>
                                    <div class="d-flex justify-content-between mb-2">
                                        <span class="text-muted">Phí vận chuyển</span>
                                        <span class="fw-bold" id="payShipping">0₫</span>
                                    </div>
                                    <hr>
                                    <div class="d-flex justify-content-between mb-3">
                                        <span class="fw-bold fs-5">Tổng cộng</span>
                                        <span class="fw-bold fs-5 text-danger" id="payTotal">0₫</span>
                                    </div>
                                    <button type="submit" class="btn btn-danger w-100 py-2">
                                        <i class="bi bi-check-circle me-1"></i>Đặt hàng
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        function renderOrderSummary() {
            const cart = getCart();
            const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            const shipping = subtotal >= 50000000 ? 0 : 500000;
            const total = subtotal + shipping;

            document.getElementById('paySubtotal').textContent = fmtPrice(subtotal);
            document.getElementById('payShipping').textContent = shipping === 0 ? 'Miễn phí' : fmtPrice(shipping);
            document.getElementById('payTotal').textContent = fmtPrice(total);

            const itemsHtml = cart.map(item => `
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="d-flex align-items-center gap-2">
                        <img src="${item.image}" alt="" style="width:45px;height:45px;object-fit:contain;background:#fafafa;border-radius:6px;padding:4px;">
                        <div>
                            <p class="mb-0 small fw-bold">${item.name}</p>
                            <p class="mb-0 text-muted" style="font-size:0.75rem;">x${item.qty}</p>
                        </div>
                    </div>
                    <span class="small fw-bold">${fmtPrice(item.price * item.qty)}</span>
                </div>
            `).join('');

            document.getElementById('orderItems').innerHTML = itemsHtml || '<p class="text-muted small">Giỏ hàng trống</p>';
        }

        function submitOrder(e) {
            e.preventDefault();
            if (!isLoggedIn()) {
                window.location.href = './login.html?redirect=' + encodeURIComponent(window.location.href);
                return false;
            }
            const cart = getCart();
            if (cart.length === 0) { alert('Giỏ hàng trống!'); return false; }

            const form = document.getElementById('paymentForm');
            const inputs = form.querySelectorAll('input, select');
            const getVal = (placeholder) => { const el = Array.from(inputs).find(i => i.placeholder === placeholder); return el ? el.value : ''; };
            const order = {
                items: cart,
                name: getVal('Nguyễn Văn A'),
                phone: getVal('0987654321'),
                email: getVal('example@email.com'),
                address: getVal('Số nhà, đường, phường/xã'),
                city: getVal('Quận 1, Hải Châu,...'),
                ward: getVal('Phường Bến Nghé,...'),
                payment: form.querySelector('input[name="payment"]:checked').value
            };
            localStorage.setItem('thinkpad_order', JSON.stringify(order));
            localStorage.removeItem('thinkpad_cart');
            window.location.href = './order.html';
            return false;
        }

        renderOrderSummary();
    </script>

                    </div>

                    </div>
                    <div class="col-lg-3 col-6">
                        <h5 class="footer-title">${footerData.contact.title}</h5>
                        ${footerData.contact.items.map(item => `<p><i class="bi ${item.icon} text-danger"></i> ${item.text}</p>`).join('')}
                    </div>
                </div>

                <div class="row align-items-center">
                    <div class="col-md-6 text-center text-md-start"><p class="copyright mb-0">${footerData.copyright}</p></div>
                    <div class="col-md-6 text-center text-md-end mt-3 mt-md-0"><span class="text-secondary">${footerData.builtWith}</span></div>
                </div>
            </div>
        `;
        footerContainer.innerHTML = footerHTML;
    </script>
