<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkPad Shop</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./bootstrap/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="./assets/style/header.css">
    <link rel="stylesheet" href="./assets/style/footer.css">
    <link rel="stylesheet" href="./assets/style/products.css">
</head>

<body>
    <!--Header-->
    <header class="navbar navbar-expand-lg navbar-dark bg-black fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="./index.html">
                ThinkPad <span class="text-light">Shop</span>
            </a>

            <div class="d-flex align-items-center gap-2 ms-auto order-lg-3">
                <div class="dropdown">
                    <a class="nav-link dropdown-toggle text-light px-2" href="#" role="button"
                        data-bs-toggle="dropdown">
                        <i class="bi bi-person fs-6"></i> <span class="d-none d-sm-inline">Tài khoản</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="./login.html">Đăng nhập</a></li>
                        <li><a class="dropdown-item" href="./register.html">Đăng ký</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item text-danger" href="#"
                                onclick="logoutUser();location.reload();return false;">Đăng xuất</a></li>
                    </ul>
                </div>
                <div class="dropdown">
                    <a class="nav-link text-light px-2 position-relative" href="#" role="button"
                        data-bs-toggle="dropdown">
                        <i class="bi bi-bell fs-6"></i>
                        <span class="badge bg-danger rounded-pill position-absolute notif-badge"
                            style="font-size:0.6rem;top:-2px;right:-2px;">3</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" style="min-width:280px;">
                        <li><h6 class="dropdown-header">Thông báo</h6></li>
                        <li><a class="dropdown-item" href="#"><small class="text-muted">ThinkPad X1 Carbon vừa được cập nhật giá mới</small></a></li>
                        <li><a class="dropdown-item" href="#"><small class="text-muted">Khuyến mãi đặc biệt dòng T Series</small></a></li>
                        <li><a class="dropdown-item" href="#"><small class="text-muted">Bảo hành mở rộng cho P Series</small></a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-center small" href="#">Xem tất cả</a></li>
                    </ul>
                </div>
                <a href="./cart.html" class="nav-link text-light px-2 position-relative">
                    <i class="bi bi-cart3 fs-6"></i>
                    <span class="badge bg-danger rounded-pill position-absolute cart-badge"
                        style="font-size:0.65rem;top:-2px;right:-4px;display:none;">0</span>
                    <span class="d-none d-sm-inline ms-1">Giỏ hàng</span>
                </a>
            </div>

            <button class="navbar-toggler order-lg-4" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse order-lg-2" id="navbarMenu">
                <ul class="navbar-nav mx-auto" id="mainMenu"></ul>
                <script>
                    const menuItems = [{ href: "./index.html", text: "Trang chủ" }, { href: "./products.html", text: "Sản phẩm" }, { href: "./about.html", text: "Giới thiệu" }, { href: "./contact.html", text: "Liên hệ" }];
                    const categorise = [{ title: "ThinkPad X1", content: "Cao cấp, siêu nhẹ, cho doanh nhân.", image: "./assets/image/cate.jpg" }, { title: "ThinkPad T Series", content: "Văn phòng, lập trình, pin bền.", image: "./assets/image/cate.jpg" }, { title: "ThinkPad P Series", content: "Workstation cho đồ họa và kỹ thuật.", image: "./assets/image/cate.jpg" }, { title: "ThinkPad E Series", content: "Giá tốt cho sinh viên và văn phòng.", image: "./assets/image/cate.jpg" }];
                    const carouselData = [{ image: "./assets/image/carousel1.jpg", title: "ThinkPad X1 Carbon Gen 12", subtitle: "Siêu nhẹ · Bền bỉ · Hiệu năng đỉnh cao", active: true }, { image: "./assets/image/carousel2.jpg", title: "ThinkPad T Series 2025", subtitle: "Ổn định · Chuyên nghiệp · Giá tốt", active: false }, { image: "./assets/image/carousel3.jpg", title: "ThinkPad P Series Workstation", subtitle: "Đồ họa mạnh · Chuẩn kỹ sư · Hiệu năng workstation", active: false }];
                    const featuredProducts = [{ image: "./assets/image/cate.jpg", name: "ThinkPad X1 Carbon", specs: "Intel Core Ultra 7 · 32GB RAM · 1TB SSD", price: "39.990.000₫", id: "x1-carbon-gen12" }, { image: "./assets/image/cate.jpg", name: "ThinkPad T14s Gen 5", specs: "AMD Ryzen 7 · 16GB RAM · 512GB SSD", price: "28.500.000₫", id: "t14s-gen5" }, { image: "./assets/image/cate.jpg", name: "ThinkPad E16 Gen 2", specs: "Intel Core i7 · 16GB RAM · 512GB SSD", price: "22.990.000₫", id: "e16-gen2" }, { image: "./assets/image/cate.jpg", name: "ThinkPad P16s Gen 3", specs: "AMD Ryzen 9 · 32GB RAM · 1TB SSD", price: "45.000.000₫", id: "p16s-gen3" }];
                    const footerData = { brand: { name: 'ThinkPad', suffix: 'Shop', desc: 'Chuyên cung cấp các dòng ThinkPad chính hãng với chất lượng cao, bảo hành uy tín và dịch vụ hỗ trợ tận tâm.', socials: [{ icon: 'bi-facebook', href: '#' }, { icon: 'bi-youtube', href: '#' }, { icon: 'bi-instagram', href: '#' }, { icon: 'bi-github', href: '#' }] }, navigation: { title: 'Điều hướng', links: [{ href: './index.html', text: 'Trang chủ' }, { href: './products.html', text: 'Sản phẩm' }, { href: './about.html', text: 'Giới thiệu' }, { href: './contact.html', text: 'Liên hệ' }] }, support: { title: 'Hỗ trợ khách hàng', links: [{ href: '#', text: 'Chính sách bảo hành' }, { href: '#', text: 'Đổi trả sản phẩm' }, { href: '#', text: 'Hướng dẫn mua hàng' }, { href: '#', text: 'Câu hỏi thường gặp' }] }, contact: { title: 'Liên hệ', items: [{ icon: 'bi-geo-alt-fill', text: 'TP. Hồ Chí Minh, Việt Nam' }, { icon: 'bi-telephone-fill', text: '0123 456 789' }, { icon: 'bi-envelope-fill', text: 'support@thinkpadshop.com' }] }, copyright: '© 2026 ThinkPad Shop. Design by Nam Nguyễn.', builtWith: 'Built with Bootstrap 5' };
                    function isLoggedIn() { return localStorage.getItem('thinkpad_logged_in') === 'true' } function loginUser() { localStorage.setItem('thinkpad_logged_in', 'true') } function logoutUser() { localStorage.removeItem('thinkpad_logged_in') } function getCart() { try { return JSON.parse(localStorage.getItem('thinkpad_cart')) || [] } catch { return [] } } function saveCart(cart) { localStorage.setItem('thinkpad_cart', JSON.stringify(cart)) } function addToCart(product) { const cart = getCart(); const existing = cart.find(item => item.id === product.id); if (existing) { existing.qty += product.qty || 1 } else { cart.push({ id: product.id, image: product.image, name: product.name, specs: product.specs, price: typeof product.price === 'string' ? parsePrice(product.price) : product.price, qty: product.qty || 1 }) } saveCart(cart); alert('Đã thêm vào giỏ hàng!'); updateCartBadge() } function updateCartBadge() { const cart = getCart(); const count = cart.reduce((sum, item) => sum + item.qty, 0); document.querySelectorAll('.cart-badge').forEach(el => { el.textContent = count; el.style.display = count > 0 ? 'inline' : 'none' }) } function parsePrice(str) { return parseInt(String(str).replace(/[.\s₫]/g, '')) } function fmtPrice(num) { return Number(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.') + '₫' }
                </script>
                <script>
                    const mainMenu = document.getElementById("mainMenu");
                    menuItems.forEach((item) => {
                        mainMenu.innerHTML += `
                            <li class="nav-item mx-2">
                                <a class="nav-link fw-semibold" href="${item.href}">${item.text}</a>
                            </li>
                        `;
                    });
                    updateCartBadge();
                    if (isLoggedIn()) {
                        const dd = document.querySelector('.dropdown .dropdown-toggle');
                        if (dd) dd.innerHTML = '<i class="bi bi-person-check fs-6"></i> <span class="d-none d-sm-inline">Tài khoản</span>';
                    }
                </script>
            </div>
        </div>
    </header>

    <!-- Breadcrumb (sát header) -->
    <div class="breadcrumb-wrap">
        <div class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="./index.html">Trang chủ</a></li>
                    <li class="breadcrumb-item active">Sản phẩm</li>
                </ol>
            </nav>
        </div>
    </div>

    <main>
        <div class="products-wrapper">
            <div id="products-container"></div>
            <script src="./data/productsPageData.js"></script>
        </div>
    </main>

    <!-- Filter Overlay & Drawer (mobile) -->
    <div class="filter-overlay" id="filterOverlay"></div>
    <div class="filter-drawer" id="filterDrawer">
        <div class="filter-drawer-header">
            <h6>Bộ lọc</h6>
            <button class="filter-drawer-close" id="filterDrawerClose">&times;</button>
        </div>
        <div id="drawerContent"></div>
    </div>

    <script>
        (function () {
            try {
                const productsContainer = document.getElementById("products-container");
                if (!productsContainer) return;

                const dataSource = (typeof productsPageData !== 'undefined' && Array.isArray(productsPageData.products))
                    ? productsPageData
                    : (typeof featuredProducts !== 'undefined' ? { title: 'Sản phẩm', subtitle: '', filters: ['Tất cả'], products: featuredProducts } : { title: 'Sản phẩm', subtitle: '', filters: ['Tất cả'], products: [] });

                const allProducts = Array.isArray(dataSource.products) ? dataSource.products.slice() : [];
                const pageSize = 12;
                let currentFilter = 'Tất cả';
                let currentPage = 1;
                let viewMode = 'grid';

                // ── Render Shell ──
                const filters = (Array.isArray(dataSource.filters) && dataSource.filters.length) ? dataSource.filters : ['Tất cả'];

                productsContainer.innerHTML = `
                    <div class="container">
                        <!-- Page Header -->
                        <div class="page-header">
                            <h1>${dataSource.title || 'Sản phẩm'}</h1>
                            <p>${dataSource.subtitle || ''}</p>
                        </div>

                        <!-- Category Chips -->
                        <div class="category-chips" id="categoryChips"></div>

                        <!-- Layout -->
                        <div class="products-layout">
                            <!-- Sidebar (desktop) -->
                            <aside class="products-sidebar">
                                <div class="sidebar-inner">
                                    <div class="sidebar-section">
                                        <span class="sidebar-label">Tìm kiếm</span>
                                        <div class="sidebar-search">
                                            <i class="bi bi-search"></i>
                                            <input id="search-input" placeholder="Tìm sản phẩm..." autocomplete="off">
                                        </div>
                                    </div>
                                    <div class="sidebar-section">
                                        <span class="sidebar-label">Dòng sản phẩm</span>
                                        <div class="filter-list" id="filterList"></div>
                                    </div>
                                    <div class="sidebar-section">
                                        <span class="sidebar-label">Sắp xếp</span>
                                        <div class="sidebar-sort">
                                            <select id="sortSelect">
                                                <option value="default">Mặc định</option>
                                                <option value="price-asc">Giá: Thấp → Cao</option>
                                                <option value="price-desc">Giá: Cao → Thấp</option>
                                                <option value="name-asc">Tên: A → Z</option>
                                                <option value="name-desc">Tên: Z → A</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="sidebar-section">
                                        <span class="sidebar-label">Hiển thị</span>
                                        <div class="view-toggle">
                                            <button id="viewGrid" class="active"><i class="bi bi-grid-3x3-gap-fill"></i> Grid</button>
                                            <button id="viewList"><i class="bi bi-list-ul"></i> List</button>
                                        </div>
                                    </div>
                                </div>
                            </aside>

                            <!-- Main -->
                            <section class="products-main">
                                <!-- Toolbar -->
                                <div class="toolbar">
                                    <div class="toolbar-left">
                                        <button class="filter-trigger" id="filterTrigger">
                                            <i class="bi bi-funnel"></i> Bộ lọc
                                        </button>
                                        <span class="result-count" id="resultCount">Hiển thị <strong>0</strong> / 0</span>
                                    </div>
                                    <div class="toolbar-right">
                                        <select id="sortSelectMobile" class="form-select form-select-sm" style="width:auto;font-size:0.82rem;border-radius:8px;border:1.5px solid var(--border-light);padding:6px 28px 6px 10px;background-image:url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2712%27 height=%2712%27 viewBox=%270 0 12 12%27%3E%3Cpath fill=%27%236c757d%27 d=%27M6 8L1 3h10z%27/%3E%3C/svg%3E');background-repeat:no-repeat;background-position:right 8px center;appearance:none;background-color:#fff;">
                                            <option value="default">Mặc định</option>
                                            <option value="price-asc">Giá: Thấp → Cao</option>
                                            <option value="price-desc">Giá: Cao → Thấp</option>
                                            <option value="name-asc">Tên: A → Z</option>
                                            <option value="name-desc">Tên: Z → A</option>
                                        </select>
                                    </div>
                                </div>

                                <!-- Product Grid -->
                                <div class="product-grid" id="productGrid"></div>

                                <!-- Pagination -->
                                <div class="pagination-wrap">
                                    <ul class="pagination" id="paginationControls"></ul>
                                </div>
                            </section>
                        </div>
                    </div>
                `;

                // ── DOM refs ──
                const categoryChips = document.getElementById('categoryChips');
                const filterList = document.getElementById('filterList');
                const productGrid = document.getElementById('productGrid');
                const paginationControls = document.getElementById('paginationControls');
                const resultCount = document.getElementById('resultCount');
                const searchInput = document.getElementById('search-input');
                const sortSelect = document.getElementById('sortSelect');
                const sortSelectMobile = document.getElementById('sortSelectMobile');
                const viewGridBtn = document.getElementById('viewGrid');
                const viewListBtn = document.getElementById('viewList');
                const filterTrigger = document.getElementById('filterTrigger');
                const filterOverlay = document.getElementById('filterOverlay');
                const filterDrawer = document.getElementById('filterDrawer');
                const filterDrawerClose = document.getElementById('filterDrawerClose');
                const drawerContent = document.getElementById('drawerContent');

                // ── Populate category chips & filter list ──
                // Count products per filter
                function countByFilter(f) {
                    if (f === 'Tất cả') return allProducts.length;
                    return allProducts.filter(p => p.series === f).length;
                }

                categoryChips.innerHTML = filters.map(f =>
                    `<button class="chip-btn ${f === 'Tất cả' ? 'active' : ''}" data-filter="${f}">${f}</button>`
                ).join('');

                filterList.innerHTML = filters.map(f => {
                    const count = countByFilter(f);
                    return `<button class="filter-btn ${f === 'Tất cả' ? 'active' : ''}" data-filter="${f}">
                        ${f} <span class="filter-count">${count}</span>
                    </button>`;
                }).join('');

                // ── Helper functions ──
                function applySort(list) {
                    const val = sortSelect.value;
                    if (val === 'price-asc') return list.sort((a, b) => parsePrice(a.price) - parsePrice(b.price));
                    if (val === 'price-desc') return list.sort((a, b) => parsePrice(b.price) - parsePrice(a.price));
                    if (val === 'name-asc') return list.sort((a, b) => a.name.localeCompare(b.name, 'vi'));
                    if (val === 'name-desc') return list.sort((a, b) => b.name.localeCompare(a.name, 'vi'));
                    return list;
                }

                function getFilteredList() {
                    const q = (searchInput.value || '').trim().toLowerCase();
                    let list = allProducts.slice();
                    if (currentFilter && currentFilter !== 'Tất cả') list = list.filter(p => p.series === currentFilter);
                    if (q) list = list.filter(p => (p.name + ' ' + (p.specs || '')).toLowerCase().includes(q));
                    list = applySort(list);
                    return list;
                }

                function badgeClass(badge) {
                    if (!badge) return '';
                    const b = badge.toLowerCase();
                    if (b.includes('bán chạy') || b.includes('khuyến mãi')) return 'sale';
                    if (b.includes('mới')) return 'new';
                    if (b.includes('cao cấp') || b.includes('workstation')) return 'premium';
                    return '';
                }

                function renderCard(p) {
                    const badge = p.badge ? `<span class="card-badge ${badgeClass(p.badge)}">${p.badge}</span>` : '';
                    const oldPrice = p.oldPrice && p.oldPrice !== '0' ? `<span class="card-old-price">${p.oldPrice}</span>` : '';

                    if (viewMode === 'list') {
                        return `
                            <div class="product-card">
                                ${badge}
                                <div class="card-img-wrap">
                                    <img src="${p.image}" alt="${p.name}" loading="lazy">
                                    <div class="quick-actions">
                                        <a href="./detail.html?id=${p.id}" class="btn-view"><i class="bi bi-eye"></i> Chi tiết</a>
                                        <a href="#" class="btn-cart" data-addcart='${JSON.stringify({ id: p.id, image: p.image, name: p.name, specs: p.specs, price: p.price }).replace(/'/g, '&#39;')}'><i class="bi bi-cart-plus"></i> Giỏ hàng</a>
                                    </div>
                                </div>
                                <div class="card-body">
                                    <div class="card-name">${p.name}</div>
                                    <div class="card-specs">${p.specs}</div>
                                    <div class="card-prices">${oldPrice}<span class="card-price">${p.price}</span></div>
                                </div>
                            </div>
                        `;
                    }

                    return `
                        <div class="product-card">
                            ${badge}
                            <div class="card-img-wrap">
                                <img src="${p.image}" alt="${p.name}" loading="lazy">
                                <div class="quick-actions">
                                    <a href="./detail.html?id=${p.id}" class="btn-view"><i class="bi bi-eye"></i> Chi tiết</a>
                                    <a href="#" class="btn-cart" data-addcart='${JSON.stringify({ id: p.id, image: p.image, name: p.name, specs: p.specs, price: p.price }).replace(/'/g, '&#39;')}'><i class="bi bi-cart-plus"></i> Thêm</a>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="card-name">${p.name}</div>
                                <div class="card-specs">${p.specs}</div>
                                <div class="card-prices">${oldPrice}<span class="card-price">${p.price}</span></div>
                            </div>
                        </div>
                    `;
                }

                function renderPagination(totalPages, page) {
                    let html = '';
                    html += `<li class="page-item ${page <= 1 ? 'disabled' : ''}"><a class="page-link" href="#" data-page="${page - 1}"><i class="bi bi-chevron-left"></i></a></li>`;
                    const maxButtons = 5;
                    let start = Math.max(1, page - Math.floor(maxButtons / 2));
                    let end = Math.min(totalPages, start + maxButtons - 1);
                    if (end - start < maxButtons - 1) start = Math.max(1, end - maxButtons + 1);
                    for (let p = start; p <= end; p++)
                        html += `<li class="page-item ${p === page ? 'active' : ''}"><a class="page-link" href="#" data-page="${p}">${p}</a></li>`;
                    html += `<li class="page-item ${page >= totalPages ? 'disabled' : ''}"><a class="page-link" href="#" data-page="${page + 1}"><i class="bi bi-chevron-right"></i></a></li>`;
                    paginationControls.innerHTML = html;
                }

                function render(page) {
                    currentPage = Math.max(1, page || 1);
                    const list = getFilteredList();
                    const total = list.length;
                    const totalPages = Math.max(1, Math.ceil(total / pageSize));
                    if (currentPage > totalPages) currentPage = totalPages;
                    const start = (currentPage - 1) * pageSize;
                    const items = list.slice(start, start + pageSize);

                    if (items.length) {
                        productGrid.innerHTML = items.map(renderCard).join('');
                    } else {
                        productGrid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="bi bi-search"></i><p>Không tìm thấy sản phẩm phù hợp.</p></div>`;
                    }

                    renderPagination(totalPages, currentPage);
                    resultCount.innerHTML = `Hiển thị <strong>${items.length}</strong> / ${total}`;

                    // Update URL
                    try {
                        const urlParams = new URLSearchParams(window.location.search);
                        if (currentFilter && currentFilter !== 'Tất cả') urlParams.set('filter', currentFilter);
                        else urlParams.delete('filter');
                        urlParams.set('page', currentPage);
                        const sortVal = sortSelect.value;
                        if (sortVal && sortVal !== 'default') urlParams.set('sort', sortVal);
                        else urlParams.delete('sort');
                        if (viewMode !== 'grid') urlParams.set('view', viewMode);
                        else urlParams.delete('view');
                        const newUrl = window.location.pathname + (urlParams.toString() ? '?' + urlParams.toString() : '');
                        history.replaceState(null, '', newUrl);
                    } catch (e) { /* ignore */ }

                    // Re-bind cart buttons
                    document.querySelectorAll('[data-addcart]').forEach(el => {
                        el.addEventListener('click', function (e) {
                            e.preventDefault();
                            try {
                                const product = JSON.parse(this.dataset.addcart);
                                addToCart(product);
                            } catch (_) { /* ignore */ }
                        });
                    });
                }

                // ── Event bindings ──

                // Category chips
                categoryChips.addEventListener('click', function (e) {
                    const btn = e.target.closest('.chip-btn');
                    if (!btn) return;
                    currentFilter = btn.dataset.filter;
                    categoryChips.querySelectorAll('.chip-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filterList.querySelectorAll('.filter-btn').forEach(b => {
                        b.classList.toggle('active', b.dataset.filter === currentFilter);
                    });
                    render(1);
                });

                // Sidebar filter list
                filterList.addEventListener('click', function (e) {
                    const btn = e.target.closest('.filter-btn');
                    if (!btn) return;
                    currentFilter = btn.dataset.filter;
                    filterList.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    categoryChips.querySelectorAll('.chip-btn').forEach(b => {
                        b.classList.toggle('active', b.dataset.filter === currentFilter);
                    });
                    render(1);
                });

                // Search
                searchInput.addEventListener('input', function () { render(1); });

                // Sort (sync both selects)
                function onSortChange() {
                    sortSelect.value = this.value;
                    sortSelectMobile.value = this.value;
                    render(1);
                }
                sortSelect.addEventListener('change', onSortChange);
                sortSelectMobile.addEventListener('change', function () {
                    sortSelect.value = this.value;
                    render(1);
                });

                // View toggle
                viewGridBtn.addEventListener('click', function () {
                    viewMode = 'grid';
                    viewGridBtn.classList.add('active');
                    viewListBtn.classList.remove('active');
                    productGrid.classList.remove('list-view');
                    render(currentPage);
                });
                viewListBtn.addEventListener('click', function () {
                    viewMode = 'list';
                    viewListBtn.classList.add('active');
                    viewGridBtn.classList.remove('active');
                    productGrid.classList.add('list-view');
                    render(currentPage);
                });

                // Pagination
                paginationControls.addEventListener('click', function (e) {
                    const a = e.target.closest('a.page-link');
                    if (!a) return;
                    e.preventDefault();
                    const p = parseInt(a.dataset.page, 10);
                    if (!isNaN(p)) render(p);
                });

                // Mobile filter drawer
                filterTrigger.addEventListener('click', function () {
                    const sidebarContent = document.querySelector('.sidebar-inner');
                    if (sidebarContent) {
                        // Strip IDs from copied HTML to avoid duplicates
                        const html = sidebarContent.innerHTML.replace(/\s+id="[^"]*"/g, '');
                        drawerContent.innerHTML = html;
                        // Re-bind events in drawer
                        const drawerSearch = drawerContent.querySelector('.sidebar-search input');
                        const drawerFilterList = drawerContent.querySelector('.filter-list');
                        const drawerSort = drawerContent.querySelector('.sidebar-sort select');
                        const drawerViewGrid = drawerContent.querySelector('#viewGrid') || drawerContent.querySelector('.view-toggle button:first-child');
                        const drawerViewList = drawerContent.querySelector('#viewList') || drawerContent.querySelector('.view-toggle button:last-child');

                        if (drawerSearch) drawerSearch.addEventListener('input', function () { searchInput.value = this.value; render(1); });
                        if (drawerFilterList) drawerFilterList.addEventListener('click', function (e) {
                            const btn = e.target.closest('.filter-btn');
                            if (!btn) return;
                            currentFilter = btn.dataset.filter;
                            drawerFilterList.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                            categoryChips.querySelectorAll('.chip-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === currentFilter));
                            render(1);
                            closeDrawer();
                        });
                        if (drawerSort) drawerSort.addEventListener('change', function () { sortSelect.value = this.value; sortSelectMobile.value = this.value; render(1); });
                        if (drawerViewGrid) drawerViewGrid.addEventListener('click', function () {
                            viewMode = 'grid';
                            drawerViewGrid.classList.add('active');
                            if (drawerViewList) drawerViewList.classList.remove('active');
                            viewGridBtn.classList.add('active');
                            viewListBtn.classList.remove('active');
                            productGrid.classList.remove('list-view');
                            render(currentPage);
                            closeDrawer();
                        });
                        if (drawerViewList) drawerViewList.addEventListener('click', function () {
                            viewMode = 'list';
                            drawerViewList.classList.add('active');
                            if (drawerViewGrid) drawerViewGrid.classList.remove('active');
                            viewListBtn.classList.add('active');
                            viewGridBtn.classList.remove('active');
                            productGrid.classList.add('list-view');
                            render(currentPage);
                            closeDrawer();
                        });
                    }
                    filterOverlay.classList.add('open');
                    filterDrawer.classList.add('open');
                    document.body.style.overflow = 'hidden';
                });

                function closeDrawer() {
                    filterOverlay.classList.remove('open');
                    filterDrawer.classList.remove('open');
                    document.body.style.overflow = '';
                }

                filterDrawerClose.addEventListener('click', closeDrawer);
                filterOverlay.addEventListener('click', closeDrawer);

                // ── Init from URL ──
                const params = new URLSearchParams(window.location.search);
                const startPage = parseInt(params.get('page') || '1', 10) || 1;
                const startFilter = params.get('filter') || 'Tất cả';
                const startSort = params.get('sort') || 'default';
                const startView = params.get('view') || 'grid';

                currentFilter = startFilter;
                viewMode = startView;

                // Set active filter
                const activeChip = categoryChips.querySelector(`.chip-btn[data-filter="${currentFilter}"]`);
                if (activeChip) {
                    categoryChips.querySelectorAll('.chip-btn').forEach(b => b.classList.remove('active'));
                    activeChip.classList.add('active');
                }
                const activeFilterBtn = filterList.querySelector(`.filter-btn[data-filter="${currentFilter}"]`);
                if (activeFilterBtn) {
                    filterList.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    activeFilterBtn.classList.add('active');
                }

                // Set sort
                const validSorts = ['default', 'price-asc', 'price-desc', 'name-asc', 'name-desc'];
                if (validSorts.includes(startSort)) {
                    sortSelect.value = startSort;
                    sortSelectMobile.value = startSort;
                }

                // Set view
                if (viewMode === 'list') {
                    viewListBtn.classList.add('active');
                    viewGridBtn.classList.remove('active');
                    productGrid.classList.add('list-view');
                }

                // ── Initial render ──
                render(startPage);

            } catch (err) {
                console.error('Products UI init error', err);
            }
        })();
    </script>
