<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkPad Shop</title>

    <link rel="stylesheet" href="./bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./bootstrap/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="./assets/style/header.css">
    <link rel="stylesheet" href="./assets/style/footer.css">
    <link rel="stylesheet" href="./assets/style/products.css">
</head>

<body>
    <!--Header-->
    <header class="navbar navbar-expand-lg navbar-dark bg-black fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="./index.html">
                ThinkPad <span class="text-light">Shop</span>
            </a>

            <div class="d-flex align-items-center gap-2 ms-auto order-lg-3">
                <div class="dropdown">
                    <a class="nav-link dropdown-toggle text-light px-2" href="#" role="button"
                        data-bs-toggle="dropdown">
                        <i class="bi bi-person fs-6"></i> <span class="d-none d-sm-inline">Tài khoản</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="./login.html">Đăng nhập</a></li>
                        <li><a class="dropdown-item" href="./register.html">Đăng ký</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item text-danger" href="#"
                                onclick="logoutUser();location.reload();return false;">Đăng xuất</a></li>
                    </ul>
                </div>
                <a href="./cart.html" class="nav-link text-light px-2 position-relative">
                    <i class="bi bi-cart3 fs-6"></i>
                    <span class="badge bg-danger rounded-pill position-absolute cart-badge"
                        style="font-size:0.65rem;top:-2px;right:-4px;display:none;">0</span>
                    <span class="d-none d-sm-inline ms-1">Giỏ hàng</span>
                </a>
            </div>

            <button class="navbar-toggler order-lg-4" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse order-lg-2" id="navbarMenu">
                <ul class="navbar-nav mx-auto" id="mainMenu"></ul>
                <script>
                    // ===== inlined homedb.js =====
                    const menuItems = [{ href: "./index.html", text: "Trang chủ" }, { href: "./products.html", text: "Sản phẩm" }, { href: "./about.html", text: "Giới thiệu" }, { href: "./contact.html", text: "Liên hệ" }];
                    const categorise = [{ title: "ThinkPad X1", content: "Cao cấp, siêu nhẹ, cho doanh nhân.", image: "./assets/image/cate.jpg" }, { title: "ThinkPad T Series", content: "Văn phòng, lập trình, pin bền.", image: "./assets/image/cate.jpg" }, { title: "ThinkPad P Series", content: "Workstation cho đồ họa và kỹ thuật.", image: "./assets/image/cate.jpg" }, { title: "ThinkPad E Series", content: "Giá tốt cho sinh viên và văn phòng.", image: "./assets/image/cate.jpg" }];
                    const carouselData = [{ image: "./assets/image/carousel1.jpg", title: "ThinkPad X1 Carbon Gen 12", subtitle: "Siêu nhẹ · Bền bỉ · Hiệu năng đỉnh cao", active: true }, { image: "./assets/image/carousel2.jpg", title: "ThinkPad T Series 2025", subtitle: "Ổn định · Chuyên nghiệp · Giá tốt", active: false }, { image: "./assets/image/carousel3.jpg", title: "ThinkPad P Series Workstation", subtitle: "Đồ họa mạnh · Chuẩn kỹ sư · Hiệu năng workstation", active: false }];
                    const featuredProducts = [{ image: "./assets/image/cate.jpg", name: "ThinkPad X1 Carbon", specs: "Intel Core Ultra 7 · 32GB RAM · 1TB SSD", price: "39.990.000₫", id: "x1-carbon-gen12" }, { image: "./assets/image/cate.jpg", name: "ThinkPad T14s Gen 5", specs: "AMD Ryzen 7 · 16GB RAM · 512GB SSD", price: "28.500.000₫", id: "t14s-gen5" }, { image: "./assets/image/cate.jpg", name: "ThinkPad E16 Gen 2", specs: "Intel Core i7 · 16GB RAM · 512GB SSD", price: "22.990.000₫", id: "e16-gen2" }, { image: "./assets/image/cate.jpg", name: "ThinkPad P16s Gen 3", specs: "AMD Ryzen 9 · 32GB RAM · 1TB SSD", price: "45.000.000₫", id: "p16s-gen3" }];
                    const footerData = { brand: { name: 'ThinkPad', suffix: 'Shop', desc: 'Chuyên cung cấp các dòng ThinkPad chính hãng với chất lượng cao, bảo hành uy tín và dịch vụ hỗ trợ tận tâm.', socials: [{ icon: 'bi-facebook', href: '#' }, { icon: 'bi-youtube', href: '#' }, { icon: 'bi-instagram', href: '#' }, { icon: 'bi-github', href: '#' }] }, navigation: { title: 'Điều hướng', links: [{ href: './index.html', text: 'Trang chủ' }, { href: './products.html', text: 'Sản phẩm' }, { href: './about.html', text: 'Giới thiệu' }, { href: './contact.html', text: 'Liên hệ' }] }, support: { title: 'Hỗ trợ khách hàng', links: [{ href: '#', text: 'Chính sách bảo hành' }, { href: '#', text: 'Đổi trả sản phẩm' }, { href: '#', text: 'Hướng dẫn mua hàng' }, { href: '#', text: 'Câu hỏi thường gặp' }] }, contact: { title: 'Liên hệ', items: [{ icon: 'bi-geo-alt-fill', text: 'TP. Hồ Chí Minh, Việt Nam' }, { icon: 'bi-telephone-fill', text: '0123 456 789' }, { icon: 'bi-envelope-fill', text: 'support@thinkpadshop.com' }] }, copyright: '© 2026 ThinkPad Shop. Design by Nam Nguyễn.', builtWith: 'Built with Bootstrap 5' };
                    function isLoggedIn() { return localStorage.getItem('thinkpad_logged_in') === 'true' } function loginUser() { localStorage.setItem('thinkpad_logged_in', 'true') } function logoutUser() { localStorage.removeItem('thinkpad_logged_in') } function getCart() { try { return JSON.parse(localStorage.getItem('thinkpad_cart')) || [] } catch { return [] } } function saveCart(cart) { localStorage.setItem('thinkpad_cart', JSON.stringify(cart)) } function addToCart(product) { const cart = getCart(); const existing = cart.find(item => item.id === product.id); if (existing) { existing.qty += product.qty || 1 } else { cart.push({ id: product.id, image: product.image, name: product.name, specs: product.specs, price: typeof product.price === 'string' ? parsePrice(product.price) : product.price, qty: product.qty || 1 }) } saveCart(cart); alert('Đã thêm vào giỏ hàng!'); updateCartBadge() } function updateCartBadge() { const cart = getCart(); const count = cart.reduce((sum, item) => sum + item.qty, 0); document.querySelectorAll('.cart-badge').forEach(el => { el.textContent = count; el.style.display = count > 0 ? 'inline' : 'none' }) } function parsePrice(str) { return parseInt(String(str).replace(/[.\s₫]/g, '')) } function fmtPrice(num) { return Number(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.') + '₫' }
                    // ===== end inlined homedb.js =====
                </script>
                <script>
                    const mainMenu = document.getElementById("mainMenu");
                    menuItems.forEach((item) => {
                        mainMenu.innerHTML += `
                            <li class="nav-item mx-2">
                                <a class="nav-link fw-semibold" href="${item.href}">${item.text}</a>
                            </li>
                        `;
                    });
                    updateCartBadge();
                    if (isLoggedIn()) {
                        const dd = document.querySelector('.dropdown .dropdown-toggle');
                        if (dd) dd.innerHTML = '<i class="bi bi-person-check fs-6"></i> <span class="d-none d-sm-inline">Tài khoản</span>';
                    }
                </script>
            </div>
        </div>
    </header>

    <main>
        <div class="products-wrapper">
            <div class="container py-2">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="./index.html">Trang chủ</a></li>
                        <li class="breadcrumb-item active">Sản phẩm</li>
                    </ol>
                </nav>
            </div>
            <div id="products-container"></div>
            <script src="./data/productsPageData.js"></script>
        </div>
    </main>
    <script>
        (function () {
            try {
                const productsContainer = document.getElementById("products-container");
                if (!productsContainer) return;

                const dataSource = (typeof productsPageData !== 'undefined' && Array.isArray(productsPageData.products))
                    ? productsPageData
                    : (typeof featuredProducts !== 'undefined' ? { title: 'Sản phẩm', subtitle: '', filters: ['Tất cả'], products: featuredProducts } : { title: 'Sản phẩm', subtitle: '', filters: ['Tất cả'], products: [] });

                const allProducts = Array.isArray(dataSource.products) ? dataSource.products.slice() : [];
                const pageSize = 12;
                let currentFilter = 'Tất cả';
                let currentPage = 1;
                let viewMode = 'grid'; // 'grid' or 'list'

                productsContainer.innerHTML = `
                    <div class="container">
                        <div class="row">
                            <aside class="col-lg-3 mb-4" id="products-sidebar">
                                <div class="card p-3 sticky-top">
                                    <h6 class="fw-bold">Bộ lọc</h6>
                                    <div class="mb-3">
                                        <input id="search-input" class="form-control form-control-sm" placeholder="Tìm kiếm sản phẩm...">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small">Dòng</label>
                                        <div id="filter-list" class="d-flex flex-column"></div>
                                    </div>
                                    <div class="mb-3 position-relative custom-select-container" style="z-index:1200;">
                                        <label class="form-label small">Sắp xếp</label>
                                        <!-- native select kept hidden as fallback -->
                                        <select id="sort-select" class="form-select form-select-sm d-none" aria-hidden="true">
                                            <option value="default">Mặc định</option>
                                            <option value="price-asc">Giá: Thấp → Cao</option>
                                            <option value="price-desc">Giá: Cao → Thấp</option>
                                            <option value="name-asc">Tên: A → Z</option>
                                            <option value="name-desc">Tên: Z → A</option>
                                        </select>
                                        <!-- custom dropdown UI -->
                                        <div class="custom-select-toggle btn form-select form-select-sm d-flex align-items-center justify-content-between" id="custom-sort" tabindex="0" role="button" aria-haspopup="listbox" aria-expanded="false">
                                            <span class="custom-select-value">Mặc định</span>
                                            <i class="bi bi-chevron-down"></i>
                                        </div>
                                        <ul class="custom-select-options list-unstyled d-none mt-1 shadow-sm bg-white" id="custom-sort-options" role="listbox" aria-labelledby="custom-sort"></ul>
                                    </div>
                                    <div class="d-flex gap-2">
                                        <button id="view-grid" class="btn btn-sm btn-outline-secondary active">Grid</button>
                                        <button id="view-list" class="btn btn-sm btn-outline-secondary">List</button>
                                    </div>
                                </div>
                            </aside>
                            <section class="col-lg-9">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <div>
                                        <h2 class="h4 mb-0">${dataSource.title || 'Sản phẩm'}</h2>
                                        <p class="text-muted small mb-0">${dataSource.subtitle || ''}</p>
                                    </div>
                                    <div id="results-count" class="text-muted small"></div>
                                </div>

                                <div id="product-grid" class="row g-3"></div>

                                <nav aria-label="Page navigation" class="mt-4">
                                    <ul class="pagination justify-content-center" id="pagination-controls"></ul>
                                </nav>
                            </section>
                        </div>
                    </div>
                `;

                const filterList = document.getElementById('filter-list');
                const productGrid = document.getElementById('product-grid');
                const paginationControls = document.getElementById('pagination-controls');
                const resultsCount = document.getElementById('results-count');
                const searchInput = document.getElementById('search-input');
                const sortSelect = document.getElementById('sort-select');
                const viewGridBtn = document.getElementById('view-grid');
                const viewListBtn = document.getElementById('view-list');

                // --- custom dropdown for sort (synchronize with hidden native select) ---
                const customSortToggle = document.getElementById('custom-sort');
                const customSortOptions = document.getElementById('custom-sort-options');
                if (sortSelect && customSortToggle && customSortOptions) {
                    // populate options from native select
                    Array.from(sortSelect.options).forEach(opt => {
                        const li = document.createElement('li');
                        li.className = 'custom-select-option';
                        li.dataset.value = opt.value;
                        li.setAttribute('role', 'option');
                        li.tabIndex = 0;
                        li.textContent = opt.textContent;
                        if (opt.selected || opt.value === sortSelect.value) {
                            li.classList.add('active');
                            li.setAttribute('aria-selected', 'true');
                            const label = customSortToggle.querySelector('.custom-select-value');
                            if (label) label.textContent = opt.textContent;
                        }
                        customSortOptions.appendChild(li);
                    });

                    function closeCustomOptions() { customSortOptions.classList.add('d-none'); customSortToggle.setAttribute('aria-expanded', 'false'); }
                    function openCustomOptions() { customSortOptions.classList.remove('d-none'); customSortToggle.setAttribute('aria-expanded', 'true'); }
                    function toggleOptions() { if (customSortOptions.classList.contains('d-none')) openCustomOptions(); else closeCustomOptions(); }

                    customSortToggle.addEventListener('click', function (e) { e.stopPropagation(); toggleOptions(); });
                    customSortToggle.addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleOptions(); } });

                    customSortOptions.addEventListener('click', function (e) {
                        const li = e.target.closest('li.custom-select-option'); if (!li) return;
                        const val = li.dataset.value;
                        // update native select and dispatch change
                        sortSelect.value = val;
                        sortSelect.dispatchEvent(new Event('change', { bubbles: true }));
                        // update custom UI
                        customSortOptions.querySelectorAll('li').forEach(n => { n.classList.remove('active'); n.setAttribute('aria-selected', 'false'); });
                        li.classList.add('active'); li.setAttribute('aria-selected', 'true');
                        const label = customSortToggle.querySelector('.custom-select-value'); if (label) label.textContent = li.textContent;
                        closeCustomOptions();
                    });

                    // keyboard navigation inside options
                    customSortOptions.addEventListener('keydown', function (e) {
                        const li = e.target.closest('li.custom-select-option'); if (!li) return;
                        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); li.click(); }
                        if (e.key === 'ArrowDown') { e.preventDefault(); if (li.nextElementSibling) li.nextElementSibling.focus(); }
                        if (e.key === 'ArrowUp') { e.preventDefault(); if (li.previousElementSibling) li.previousElementSibling.focus(); }
                    });

                    // close on outside click or ESC
                    document.addEventListener('click', function (e) { if (!customSortToggle.contains(e.target) && !customSortOptions.contains(e.target)) closeCustomOptions(); });
                    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeCustomOptions(); });
                }

                const filters = (Array.isArray(dataSource.filters) && dataSource.filters.length) ? dataSource.filters : ['Tất cả'];
                filterList.innerHTML = filters.map(f => `<button class="btn btn-sm mb-1 text-start ${f==='Tất cả'?'btn-danger text-white':'btn-outline-secondary'}" data-filter="${f}">${f}</button>`).join('');

                function applySort(list) {
                    const val = sortSelect.value;
                    if (val === 'price-asc') return list.sort((a,b)=>parsePrice(a.price)-parsePrice(b.price));
                    if (val === 'price-desc') return list.sort((a,b)=>parsePrice(b.price)-parsePrice(a.price));
                    if (val === 'name-asc') return list.sort((a,b)=>a.name.localeCompare(b.name, 'vi'));
                    if (val === 'name-desc') return list.sort((a,b)=>b.name.localeCompare(a.name, 'vi'));
                    return list;
                }

                function getFilteredList() {
                    const q = (searchInput.value || '').trim().toLowerCase();
                    let list = allProducts.slice();
                    if (currentFilter && currentFilter !== 'Tất cả') list = list.filter(p => p.series === currentFilter);
                    if (q) list = list.filter(p => (p.name + ' ' + (p.specs||'')).toLowerCase().includes(q));
                    list = applySort(list);
                    return list;
                }

                function renderCard(p) {
                    const badge = p.badge ? `<span class="badge bg-danger">${p.badge}</span>` : '';
                    const oldPrice = p.oldPrice && p.oldPrice !== '0' ? `<span class="old-price me-2">${p.oldPrice}</span>` : '';
                    if (viewMode === 'list') {
                        return `
                            <div class="col-12">
                                <div class="card p-2 product-list-item">
                                    <div class="d-flex gap-3 align-items-center">
                                        <img src="${p.image}" class="product-list-img" alt="${p.name}">
                                        <div class="flex-fill">
                                            <h6 class="mb-1">${p.name} ${badge}</h6>
                                            <p class="mb-1 text-muted small">${p.specs}</p>
                                            <div class="d-flex gap-2 align-items-center">
                                                ${oldPrice}<span class="current-price fw-bold text-danger">${p.price}</span>
                                                <div class="ms-auto d-flex gap-1">
                                                    <a href="./detail.html?id=${p.id}" class="btn btn-outline-danger btn-sm">Chi tiết</a>
                                                    <a href="#" class="btn btn-danger btn-sm" onclick="addToCart({id:'${p.id}',image:'${p.image}',name:'${p.name}',specs:'${p.specs}',price:'${p.price}'});return false;">Giỏ hàng</a>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                    return `
                        <div class="col-6 col-md-4 col-lg-3">
                            <div class="product-card card h-100">
                                ${badge}
                                <img src="${p.image}" class="card-img-top" alt="${p.name}">
                                <div class="card-body d-flex flex-column">
                                    <h6 class="card-title">${p.name}</h6>
                                    <p class="card-text flex-grow-1">${p.specs}</p>
                                    <div class="mt-auto d-flex align-items-center">
                                        ${oldPrice}<span class="current-price">${p.price}</span>
                                    </div>
                                    <div class="d-flex gap-1 mt-2">
                                        <a href="./detail.html?id=${p.id}" class="btn btn-outline-danger btn-sm flex-fill">Chi tiết</a>
                                        <a href="#" class="btn btn-danger btn-sm flex-fill" onclick="addToCart({id:'${p.id}',image:'${p.image}',name:'${p.name}',specs:'${p.specs}',price:'${p.price}'});return false;">Giỏ hàng</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }

                function renderPagination(totalPages, page) {
                    let html = '';
                    html += `<li class="page-item ${page<=1?'disabled':''}"><a class="page-link" href="#" data-page="${page-1}">&laquo;</a></li>`;
                    const maxButtons = 5;
                    let start = Math.max(1, page - Math.floor(maxButtons/2));
                    let end = Math.min(totalPages, start + maxButtons -1);
                    if (end - start < maxButtons -1) start = Math.max(1, end - maxButtons +1);
                    for (let p=start; p<=end; p++) html += `<li class="page-item ${p===page?'active':''}"><a class="page-link" href="#" data-page="${p}">${p}</a></li>`;
                    html += `<li class="page-item ${page>=totalPages?'disabled':''}"><a class="page-link" href="#" data-page="${page+1}">&raquo;</a></li>`;
                    paginationControls.innerHTML = html;
                }

                function render(page=1) {
                    currentPage = Math.max(1, page);
                    const list = getFilteredList();
                    const total = list.length;
                    const totalPages = Math.max(1, Math.ceil(total / pageSize));
                    if (currentPage > totalPages) currentPage = totalPages;
                    const start = (currentPage-1)*pageSize;
                    const items = list.slice(start, start+pageSize);
                    productGrid.innerHTML = items.map(renderCard).join('') || '<div class="col-12"><p class="text-center text-muted">Không có sản phẩm.</p></div>';
                    renderPagination(totalPages, currentPage);
                    resultsCount.textContent = `Hiển thị ${items.length} / ${total}`;

                    // update URL params (persist filter, page, sort)
                    try {
                        const urlParams = new URLSearchParams(window.location.search);
                        if (currentFilter && currentFilter !== 'Tất cả') urlParams.set('filter', currentFilter); else urlParams.delete('filter');
                        urlParams.set('page', currentPage);
                        const sortVal = (sortSelect && sortSelect.value) ? sortSelect.value : 'default';
                        if (sortVal && sortVal !== 'default') urlParams.set('sort', sortVal); else urlParams.delete('sort');
                        const newUrl = window.location.pathname + (urlParams.toString() ? '?' + urlParams.toString() : '');
                        history.replaceState(null, '', newUrl);
                    } catch (e) { /* ignore */ }
                }

                // Event bindings
                paginationControls.addEventListener('click', function(ev){
                    const a = ev.target.closest('a.page-link'); if(!a) return; ev.preventDefault(); const p = parseInt(a.dataset.page,10); if(!isNaN(p)) render(p);
                });

                filterList.addEventListener('click', function(ev){
                    const btn = ev.target.closest('button[data-filter]'); if(!btn) return; currentFilter = btn.dataset.filter; // toggle styles
                    filterList.querySelectorAll('button').forEach(b=>{ b.classList.remove('btn-danger','text-white'); b.classList.add('btn-outline-secondary'); });
                    btn.classList.remove('btn-outline-secondary'); btn.classList.add('btn-danger','text-white');
                    render(1);
                });

                searchInput.addEventListener('input', function(){ render(1); });
                sortSelect.addEventListener('change', function(){ render(1); });
                viewGridBtn.addEventListener('click', function(){ viewMode='grid'; viewGridBtn.classList.add('active'); viewListBtn.classList.remove('active'); render(currentPage); });
                viewListBtn.addEventListener('click', function(){ viewMode='list'; viewListBtn.classList.add('active'); viewGridBtn.classList.remove('active'); render(currentPage); });

                // Init values from URL
                const params = new URLSearchParams(window.location.search);
                const startPage = parseInt(params.get('page')||'1',10) || 1;
                const startFilter = params.get('filter') || 'Tất cả';
                const startSort = params.get('sort') || 'default';
                currentFilter = startFilter;
                // set active filter button
                const activeBtn = filterList.querySelector(`button[data-filter="${currentFilter}"]`);
                if (activeBtn) { filterList.querySelectorAll('button').forEach(b=>{ b.classList.remove('btn-danger','text-white'); b.classList.add('btn-outline-secondary'); }); activeBtn.classList.remove('btn-outline-secondary'); activeBtn.classList.add('btn-danger','text-white'); }
                // set initial sort if present
                const validSorts = ['default','price-asc','price-desc','name-asc','name-desc'];
                if (validSorts.includes(startSort)) sortSelect.value = startSort;
                // sync custom dropdown label/active option (if present)
                try {
                    if (typeof customSortOptions !== 'undefined' && customSortOptions) {
                        const sel = customSortOptions.querySelector(`li[data-value="${sortSelect.value}"]`);
                        if (sel) {
                            customSortOptions.querySelectorAll('li').forEach(n=>{ n.classList.remove('active'); n.setAttribute('aria-selected','false'); });
                            sel.classList.add('active'); sel.setAttribute('aria-selected','true');
                            const label = (typeof customSortToggle !== 'undefined') && customSortToggle ? customSortToggle.querySelector('.custom-select-value') : null;
                            if (label) label.textContent = sel.textContent;
                        }
                    }
                } catch(e) { /* ignore */ }
                render(startPage);

            } catch (err) {
                console.error('Products UI init error', err);
                alert('Lỗi giao diện sản phẩm: ' + (err && err.message ? err.message : String(err)));
            }
        })();
    </script>

    <!-- Footer -->
    <footer class="bg-black text-light pt-5 pb-3 mt-5" id="footer-container"></footer>
    <script>
        const footerContainer = document.getElementById("footer-container");
        const footerHTML = `
            <div class="container">
                <div class="row g-4">
                    <div class="col-lg-4 col-6">
                        <h3 class="fw-bold text-danger">
                            ${footerData.brand.name} <span class="text-light">${footerData.brand.suffix}</span>
                        </h3>
                        <p class="text-secondary mt-3">${footerData.brand.desc}</p>
                        <div class="d-flex gap-3 mt-4">
